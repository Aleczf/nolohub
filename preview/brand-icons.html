<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:24px;color:var(--nv-ink);}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:18px;align-items:start;}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
.cell svg{width:40px;height:40px;color:var(--nv-ink);}
.lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--nv-ink-mute);text-align:center;}
</style></head><body>
<div class="grid">
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-juniper.svg" style="width:40px;height:40px;color:#1A1A18;"></object><div class="lbl">Juniper</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-hop.svg" style="width:40px;height:40px;"></object><div class="lbl">Hop</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-tea.svg" style="width:40px;height:40px;"></object><div class="lbl">Tea</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-citrus.svg" style="width:40px;height:40px;"></object><div class="lbl">Citrus</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-elderflower.svg" style="width:40px;height:40px;"></object><div class="lbl">Elder</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-ginger.svg" style="width:40px;height:40px;"></object><div class="lbl">Ginger</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-coffee.svg" style="width:40px;height:40px;"></object><div class="lbl">Coffee</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/cat-grape.svg" style="width:40px;height:40px;"></object><div class="lbl">Grape</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/proc-distill.svg" style="width:40px;height:40px;"></object><div class="lbl">Distill</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/proc-ferment.svg" style="width:40px;height:40px;"></object><div class="lbl">Ferment</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/ui-search.svg" style="width:40px;height:40px;"></object><div class="lbl">Search</div></div>
  <div class="cell"><object type="image/svg+xml" data="../assets/icons/ui-filter.svg" style="width:40px;height:40px;"></object><div class="lbl">Filter</div></div>
</div>
</body></html>
