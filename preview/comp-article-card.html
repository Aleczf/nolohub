<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:24px;font-family:var(--nv-font-body);}
.card{border:1px solid var(--nv-ink);padding:18px;background:var(--nv-paper);}
.kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--nv-accent);}
.t{font-family:var(--nv-font-body);font-weight:500;font-size:24px;line-height:1.15;letter-spacing:-.005em;margin:8px 0 6px;}
.m{font-size:13px;color:var(--nv-ink-mute);letter-spacing:.04em;}
.thumb{aspect-ratio:16/9;background:linear-gradient(135deg,#8A8780 0%, #4A4A46 100%);border:1px solid var(--nv-ink);margin-bottom:12px;}
</style></head><body>
<article class="card">
  <div class="thumb"></div>
  <div class="kicker">RECENSIONE — DEALC. WINE</div>
  <h3 class="t">Il dosaggio è la firma: tutto si gioca su tre grammi</h3>
  <div class="m">Alessandro Frau — 4 maggio 2026 · 7 min</div>
</article>
</body></html>
