<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:#1A1A18;color:#F5F2ED;}body{padding:20px;font-family:var(--nv-font-body);}
.row{display:grid;grid-template-columns:80px 1fr 100px 80px;gap:16px;align-items:center;border-top:1px solid #3A3A35;padding:14px 0;}
.row:first-child{border-top:0;}
.score{font-family:var(--nv-font-display);font-weight:800;font-size:48px;line-height:.85;letter-spacing:-.04em;color:#C4531A;font-variant-numeric:tabular-nums;}
.t{font-family:var(--nv-font-body);font-weight:500;font-size:18px;line-height:1.2;}
.m{font-size:11px;color:#B8B5AE;letter-spacing:.06em;text-transform:uppercase;margin-top:3px;}
.cat{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#B8B5AE;}
.yr{font-family:var(--nv-font-mono),monospace;font-size:13px;color:#B8B5AE;text-align:right;}
</style></head><body>
<div class="row">
  <div class="score">88</div>
  <div><div class="t">Lallier de-alc. Brut Nature</div><div class="m">Champagne · Francia · Lallier</div></div>
  <div class="cat">Champagne</div>
  <div class="yr">€42</div>
</div>
<div class="row">
  <div class="score">82</div>
  <div><div class="t">Mareterra Vermouth Zero</div><div class="m">Vermouth · Italia · Distilleria Mareterra</div></div>
  <div class="cat">Vermouth</div>
  <div class="yr">€26</div>
</div>
<div class="row">
  <div class="score">76</div>
  <div><div class="t">Three Cents Bitter Lemon NA</div><div class="m">Mixer · Grecia · Three Cents</div></div>
  <div class="cat">Mixer</div>
  <div class="yr">€8</div>
</div>
</body></html>
