<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--nv-paper);}
body{padding:24px;box-sizing:border-box;}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.sw{border:1px solid var(--nv-rule);height:120px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;box-sizing:border-box;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
.hex{font-family:var(--nv-font-mono),monospace;font-size:11px;}
.title{font-family:var(--nv-font-display);font-weight:800;font-size:32px;line-height:.9;letter-spacing:-.02em;text-transform:uppercase;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#C4531A;color:#F5F2ED;"><div class="title">88</div><div><div class="lbl">Accent</div><div class="hex">#C4531A</div></div></div>
  <div class="sw" style="background:#9E3F12;color:#F5F2ED;"><div class="title">88</div><div><div class="lbl">Accent deep</div><div class="hex">#9E3F12</div></div></div>
  <div class="sw" style="background:#E8C8B2;color:#1A1A18;"><div class="title">88</div><div><div class="lbl">Accent tint</div><div class="hex">#E8C8B2</div></div></div>
</div>
</body></html>
