<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:24px;font-family:var(--nv-font-body);}
.row{display:flex;gap:14px;flex-wrap:wrap;}
.btn{font-family:var(--nv-font-body);font-weight:500;font-size:15px;padding:12px 20px;border-radius:2px;border:1px solid var(--nv-ink);background:var(--nv-paper);color:var(--nv-ink);cursor:pointer;letter-spacing:.01em;}
.btn--primary{background:var(--nv-accent);color:var(--nv-paper);border-color:var(--nv-accent);}
.btn--ghost{background:transparent;border-color:var(--nv-ink);}
.btn--text{background:transparent;border:0;padding:12px 0;text-decoration:underline;text-underline-offset:4px;}
.btn--sm{font-size:13px;padding:8px 14px;}
</style></head><body>
<div class="row">
  <button class="btn btn--primary">Leggi la scheda</button>
  <button class="btn">Iscriviti</button>
  <button class="btn btn--ghost">Database →</button>
  <button class="btn btn--text">Salta al journal</button>
  <button class="btn btn--sm btn--primary">Filtra</button>
  <button class="btn btn--sm">Reset</button>
</div>
</body></html>
