<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:var(--nv-paper);}
body{padding:24px;box-sizing:border-box;}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.sw{border:1px solid var(--nv-rule);height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-sizing:border-box;}
.lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
.hex{font-family:var(--nv-font-mono),monospace;font-size:11px;margin-top:2px;}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#F5F2ED;color:#1A1A18;"><div class="lbl">Paper</div><div class="hex">#F5F2ED</div></div>
  <div class="sw" style="background:#ECE7DE;color:#1A1A18;"><div class="lbl">Paper deep</div><div class="hex">#ECE7DE</div></div>
  <div class="sw" style="background:#E2DCD0;color:#1A1A18;"><div class="lbl">Paper edge</div><div class="hex">#E2DCD0</div></div>
  <div class="sw" style="background:#1A1A18;color:#F5F2ED;"><div class="lbl">Ink</div><div class="hex">#1A1A18</div></div>
  <div class="sw" style="background:#4A4A46;color:#F5F2ED;"><div class="lbl">Ink soft</div><div class="hex">#4A4A46</div></div>
  <div class="sw" style="background:#8A8780;color:#F5F2ED;"><div class="lbl">Ink mute</div><div class="hex">#8A8780</div></div>
</div>
</body></html>
