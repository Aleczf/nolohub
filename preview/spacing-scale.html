<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:20px;font-family:var(--nv-font-body);}
.r{display:flex;align-items:center;gap:14px;border-top:1px solid var(--nv-rule-soft);padding:8px 0;font-size:13px;}
.r:first-child{border-top:0;}
.bar{background:var(--nv-ink);height:14px;border-radius:2px;}
.lbl{width:60px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--nv-ink-mute);}
.px{margin-left:auto;font-family:var(--nv-font-mono),monospace;font-size:11px;color:var(--nv-ink-mute);}
</style></head><body>
<div class="r"><div class="lbl">s-1</div><div class="bar" style="width:4px;"></div><div class="px">4px</div></div>
<div class="r"><div class="lbl">s-2</div><div class="bar" style="width:8px;"></div><div class="px">8px</div></div>
<div class="r"><div class="lbl">s-3</div><div class="bar" style="width:12px;"></div><div class="px">12px</div></div>
<div class="r"><div class="lbl">s-4</div><div class="bar" style="width:16px;"></div><div class="px">16px</div></div>
<div class="r"><div class="lbl">s-5</div><div class="bar" style="width:24px;"></div><div class="px">24px</div></div>
<div class="r"><div class="lbl">s-6</div><div class="bar" style="width:32px;"></div><div class="px">32px</div></div>
<div class="r"><div class="lbl">s-7</div><div class="bar" style="width:48px;"></div><div class="px">48px</div></div>
<div class="r"><div class="lbl">s-8</div><div class="bar" style="width:64px;"></div><div class="px">64px</div></div>
</body></html>
