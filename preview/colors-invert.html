<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#1A1A18;color:#F5F2ED;}
body{padding:24px;box-sizing:border-box;font-family:var(--nv-font-body);}
.kicker{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#C4531A;margin-bottom:12px;}
.row{display:flex;align-items:flex-end;gap:24px;border-top:1px solid #3A3A35;padding-top:16px;}
.score{font-family:var(--nv-font-display);font-weight:800;font-size:96px;line-height:.85;letter-spacing:-.04em;color:#C4531A;}
.t{font-family:var(--nv-font-display);font-weight:800;font-size:28px;line-height:1;letter-spacing:-.015em;text-transform:uppercase;}
.m{font-size:11px;color:#B8B5AE;letter-spacing:.06em;text-transform:uppercase;margin-top:6px;}
</style></head><body>
<div class="kicker">DATABASE — INVERSIONE PALETTE</div>
<div class="row">
  <div class="score">88</div>
  <div style="flex:1">
    <div class="t">Lallier de-alc.</div>
    <div class="m">Champagne · Francia · Brut nature</div>
  </div>
</div>
</body></html>
