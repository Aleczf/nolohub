<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:24px;font-family:var(--nv-font-body);}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.cell{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.box{width:100%;height:64px;border:1px solid var(--nv-ink);background:var(--nv-paper-deep);}
.lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--nv-ink-mute);}
.px{font-family:var(--nv-font-mono),monospace;font-size:11px;}
</style></head><body>
<div class="row">
  <div class="cell"><div class="box" style="border-radius:0;"></div><div class="lbl">Sharp / Editorial</div><div class="px">0px — articoli, hero</div></div>
  <div class="cell"><div class="box" style="border-radius:2px;"></div><div class="lbl">Default</div><div class="px">2px — badge, score-pill</div></div>
  <div class="cell"><div class="box" style="border-radius:4px;"></div><div class="lbl">Form</div><div class="px">4px — solo input/select</div></div>
  <div class="cell"><div class="box" style="border:1px solid var(--nv-rule-soft);"></div><div class="lbl">Hairline</div><div class="px">1px soft — separatori</div></div>
</div>
</body></html>
