<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:24px;font-family:var(--nv-font-body);}
.f{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--nv-ink-mute);}
input,select{font-family:var(--nv-font-body);font-size:15px;padding:10px 12px;border:1px solid var(--nv-ink);border-radius:4px;background:var(--nv-paper);color:var(--nv-ink);}
input:focus{outline:2px solid var(--nv-accent);outline-offset:1px;border-color:var(--nv-accent);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
</style></head><body>
<div class="row">
  <div class="f"><label>Email</label><input value="alessandro@nolovault.it"></div>
  <div class="f"><label>Categoria</label><select><option>Tutti</option><option>Vermouth</option><option>Champagne</option></select></div>
</div>
<div class="f"><label>Cerca nel database</label><input placeholder="Es. Lallier, brut nature, dealc."></div>
</body></html>
