<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:20px;font-family:var(--nv-font-body);}
.r{display:flex;align-items:baseline;gap:12px;border-bottom:1px solid var(--nv-rule-soft);padding:10px 0;}
.s{font-family:var(--nv-font-display);font-weight:800;text-transform:uppercase;line-height:.9;letter-spacing:-.02em;color:var(--nv-ink);}
.lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--nv-ink-mute);min-width:88px;}
.px{font-family:var(--nv-font-mono),monospace;font-size:11px;color:var(--nv-ink-mute);margin-left:auto;}
</style></head><body>
<div class="r"><div class="lbl">Monument</div><div class="s" style="font-size:64px;">A</div><div class="px">128px clamp</div></div>
<div class="r"><div class="lbl">Display</div><div class="s" style="font-size:48px;">A</div><div class="px">96px clamp</div></div>
<div class="r"><div class="lbl">Headline</div><div class="s" style="font-size:36px;">A</div><div class="px">60px clamp</div></div>
<div class="r"><div class="lbl">Title</div><div style="font-size:28px;font-weight:500;">A</div><div class="px">28px DM Sans</div></div>
<div class="r"><div class="lbl">Body</div><div style="font-size:17px;">A</div><div class="px">17px DM Sans</div></div>
<div class="r"><div class="lbl">Caption</div><div style="font-size:11px;">A</div><div class="px">11px DM Sans</div></div>
</body></html>
