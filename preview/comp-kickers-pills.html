<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;padding:0;background:var(--nv-paper);}body{padding:24px;font-family:var(--nv-font-body);}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--nv-accent);font-weight:500;}
.pill{font-size:13px;padding:6px 12px;border:1px solid var(--nv-ink);border-radius:2px;background:var(--nv-paper);}
.pill--active{background:var(--nv-ink);color:var(--nv-paper);}
.badge-pick{font-family:var(--nv-font-display);font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;background:var(--nv-accent);color:var(--nv-paper);padding:5px 10px;border-radius:2px;}
.tag{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--nv-ink-mute);border-bottom:1px solid var(--nv-rule-soft);padding-bottom:2px;}
</style></head><body>
<div class="row" style="margin-bottom:14px;">
  <span class="kicker">RECENSIONE — VERMOUTH ZERO</span>
  <span class="badge-pick">VAULT PICK</span>
  <span class="tag">CHAMPAGNE</span>
  <span class="tag">FRANCIA</span>
</div>
<div class="row">
  <span class="pill pill--active">Tutti</span>
  <span class="pill">Vermouth</span>
  <span class="pill">Champagne</span>
  <span class="pill">Amari</span>
  <span class="pill">Spirits</span>
</div>
</body></html>
